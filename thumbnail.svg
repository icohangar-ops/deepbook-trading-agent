<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#141b33"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#0099ff"/>
    </linearGradient>
    <linearGradient id="bidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="askGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4d6a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff4d6a" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadowLight">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  <circle cx="1100" cy="80" r="300" fill="#0099ff" opacity="0.03"/>
  <circle cx="200" cy="500" r="250" fill="#00d4aa" opacity="0.03"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="200" y1="0" x2="200" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/>
    <line x1="600" y1="0" x2="600" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="1000" y1="0" x2="1000" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/>
  </g>

  <!-- Orderbook visualization -->
  <!-- Bids (buy) bars - going left -->
  <g>
    <rect x="660" y="420" width="80" height="35" fill="url(#bidGrad)" rx="2"/>
    <rect x="620" y="385" width="120" height="35" fill="url(#bidGrad)" rx="2"/>
    <rect x="590" y="350" width="150" height="35" fill="url(#bidGrad)" rx="2"/>
    <rect x="550" y="315" width="190" height="35" fill="url(#bidGrad)" rx="2"/>
    <rect x="500" y="280" width="240" height="35" fill="url(#bidGrad)" rx="2"/>
    <rect x="460" y="245" width="280" height="35" fill="url(#bidGrad)" rx="2"/>
    <rect x="410" y="210" width="330" height="35" fill="url(#bidGrad)" rx="2"/>
    <rect x="370" y="175" width="370" height="35" fill="url(#bidGrad)" rx="2"/>
    <rect x="330" y="140" width="410" height="35" fill="url(#bidGrad)" rx="2"/>
  </g>

  <!-- Asks (sell) bars - going right -->
  <g>
    <rect x="740" y="420" width="60" height="35" fill="url(#askGrad)" rx="2"/>
    <rect x="740" y="385" width="100" height="35" fill="url(#askGrad)" rx="2"/>
    <rect x="740" y="350" width="130" height="35" fill="url(#askGrad)" rx="2"/>
    <rect x="740" y="315" width="170" height="35" fill="url(#askGrad)" rx="2"/>
    <rect x="740" y="280" width="210" height="35" fill="url(#askGrad)" rx="2"/>
    <rect x="740" y="245" width="250" height="35" fill="url(#askGrad)" rx="2"/>
    <rect x="740" y="210" width="290" height="35" fill="url(#askGrad)" rx="2"/>
    <rect x="740" y="175" width="340" height="35" fill="url(#askGrad)" rx="2"/>
    <rect x="740" y="140" width="380" height="35" fill="url(#askGrad)" rx="2"/>
  </g>

  <!-- Center line (mid price) -->
  <line x1="740" y1="125" x2="740" y2="465" stroke="#ffffff" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Center spread label -->
  <rect x="680" y="470" width="120" height="30" rx="15" fill="#ffffff" fill-opacity="0.08"/>
  <text x="740" y="490" text-anchor="middle" fill="#ffffff" fill-opacity="0.6" font-family="monospace" font-size="12">MARKET DEPTH</text>

  <!-- Price labels on bars -->
  <g fill="#ffffff" fill-opacity="0.4" font-family="monospace" font-size="11">
    <text x="260" y="163" text-anchor="end">$0.85</text>
    <text x="260" y="198" text-anchor="end">$0.84</text>
    <text x="260" y="233" text-anchor="end">$0.83</text>
    <text x="260" y="268" text-anchor="end">$0.82</text>
    <text x="260" y="303" text-anchor="end">$0.81</text>
    <text x="260" y="338" text-anchor="end">$0.80</text>
    <text x="260" y="373" text-anchor="end">$0.79</text>
    <text x="260" y="408" text-anchor="end">$0.78</text>
    <text x="260" y="443" text-anchor="end">$0.77</text>

    <text x="1100" y="163" text-anchor="start">$0.86</text>
    <text x="1100" y="198" text-anchor="start">$0.87</text>
    <text x="1100" y="233" text-anchor="start">$0.88</text>
    <text x="1100" y="268" text-anchor="start">$0.89</text>
    <text x="1100" y="303" text-anchor="start">$0.90</text>
    <text x="1100" y="338" text-anchor="start">$0.91</text>
    <text x="1100" y="373" text-anchor="start">$0.92</text>
    <text x="1100" y="408" text-anchor="start">$0.93</text>
    <text x="1100" y="443" text-anchor="start">$0.94</text>
  </g>

  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="60" fill="#000000" fill-opacity="0.2"/>
  <g filter="url(#shadowLight)">
    <text x="640" y="38" text-anchor="middle" fill="#ffffff" font-family="'SF Mono','Courier New',monospace" font-size="22" font-weight="bold" letter-spacing="3">DEEPBOOK TRADING AGENT</text>
  </g>

  <!-- Stat cards -->
  <g filter="url(#shadowLight)">
    <!-- TVL Card -->
    <rect x="40" y="80" width="180" height="80" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="130" y="110" text-anchor="middle" fill="#ffffff" fill-opacity="0.5" font-family="monospace" font-size="11">TOTAL VALUE LOCKED</text>
    <text x="130" y="140" text-anchor="middle" fill="url(#accentGrad)" font-family="'SF Mono','Courier New',monospace" font-size="18" font-weight="bold">$4.2M</text>

    <!-- Orders Card -->
    <rect x="240" y="80" width="180" height="80" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="330" y="110" text-anchor="middle" fill="#ffffff" fill-opacity="0.5" font-family="monospace" font-size="11">ACTIVE ORDERS</text>
    <text x="330" y="140" text-anchor="middle" fill="#ffffff" font-family="'SF Mono','Courier New',monospace" font-size="18" font-weight="bold">1,247</text>

    <!-- Win Rate Card -->
    <rect x="440" y="80" width="180" height="80" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="530" y="110" text-anchor="middle" fill="#ffffff" fill-opacity="0.5" font-family="monospace" font-size="11">AGENT WIN RATE</text>
    <text x="530" y="140" text-anchor="middle" fill="#00d4aa" font-family="'SF Mono','Courier New',monospace" font-size="18" font-weight="bold">72.3%</text>

    <!-- AI Trades Card -->
    <rect x="640" y="80" width="180" height="80" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="730" y="110" text-anchor="middle" fill="#ffffff" fill-opacity="0.5" font-family="monospace" font-size="11">AI TRADES</text>
    <text x="730" y="140" text-anchor="middle" fill="#0099ff" font-family="'SF Mono','Courier New',monospace" font-size="18" font-weight="bold">3,892</text>

    <!-- Walrus Blobs Card -->
    <rect x="840" y="80" width="180" height="80" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="930" y="110" text-anchor="middle" fill="#ffffff" fill-opacity="0.5" font-family="monospace" font-size="11">WALRUS AUDITS</text>
    <text x="930" y="140" text-anchor="middle" fill="#ffffff" font-family="'SF Mono','Courier New',monospace" font-size="18" font-weight="bold">3,892</text>

    <!-- P&L Card -->
    <rect x="1040" y="80" width="200" height="80" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#00d4aa" stroke-opacity="0.3" stroke-width="1"/>
    <text x="1140" y="110" text-anchor="middle" fill="#ffffff" fill-opacity="0.5" font-family="monospace" font-size="11">P&amp;L (24H)</text>
    <text x="1140" y="140" text-anchor="middle" fill="#00d4aa" font-family="'SF Mono','Courier New',monospace" font-size="18" font-weight="bold">+$45,230</text>
  </g>

  <!-- Sui / Depth labels on bars -->
  <g fill="#ffffff" fill-opacity="0.3" font-family="monospace" font-size="10">
    <text x="750" y="520" text-anchor="middle">BID ← SPREAD → ASK</text>
  </g>

  <!-- Bottom legend -->
  <rect x="450" y="560" width="16" height="12" rx="2" fill="#00d4aa" fill-opacity="0.6"/>
  <text x="475" y="571" fill="#ffffff" fill-opacity="0.5" font-family="monospace" font-size="12">Bids</text>
  <rect x="560" y="560" width="16" height="12" rx="2" fill="#ff4d6a" fill-opacity="0.6"/>
  <text x="585" y="571" fill="#ffffff" fill-opacity="0.5" font-family="monospace" font-size="12">Asks</text>
  <rect x="670" y="560" width="16" height="12" rx="2" fill="#0099ff" fill-opacity="0.6"/>
  <text x="695" y="571" fill="#ffffff" fill-opacity="0.5" font-family="monospace" font-size="12">PTB</text>
  <rect x="760" y="560" width="16" height="12" rx="2" fill="url(#accentGrad)" fill-opacity="0.6"/>
  <text x="785" y="571" fill="#ffffff" fill-opacity="0.5" font-family="monospace" font-size="12">Walrus</text>

  <!-- Status indicators -->
  <g filter="url(#glow)">
    <circle cx="50" cy="615" r="5" fill="#00d4aa" opacity="0.8"/>
    <circle cx="50" cy="615" r="3" fill="#00ffcc"/>
  </g>
  <text x="65" y="619" fill="#ffffff" fill-opacity="0.4" font-family="monospace" font-size="11">Sui Mainnet ● Connected</text>

  <!-- DeepBook logo text -->
  <g transform="translate(640, 590)">
    <text x="0" y="0" text-anchor="middle" fill="#ffffff" fill-opacity="0.15" font-family="'SF Mono','Courier New',monospace" font-size="11" letter-spacing="4">POWERED BY DEEPBOOK • SUI • WALRUS</text>
  </g>
</svg>
